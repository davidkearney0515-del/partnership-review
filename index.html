<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partnership Review System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16181D; --ink-soft:#5A616E; --ink-faint:#8A909C;
    --bg:#ECEEF1; --card:#FFFFFF; --line:#E1E4E9; --line-soft:#EDEFF2;
    --brand:#E4002B; --accent:#2F6BE0; --accent-soft:#EAF0FC;
    --good:#10876B; --good-bg:#E4F3EE;
    --warn:#C98A00; --warn-bg:#FAF1DC;
    --bad:#D23B47;  --bad-bg:#FBE7E9;
    --track:#EDEFF2;
    --radius:14px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(20,24,31,.05),0 8px 24px -12px rgba(20,24,31,.12);
    --shadow-lg:0 12px 40px -12px rgba(20,24,31,.28);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;font-size:14px}
  .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}

  header.top{position:sticky;top:0;z-index:40;background:var(--ink);color:#fff;display:flex;align-items:center;gap:16px;padding:0 22px;height:58px}
  .wordmark{font-family:'Space Grotesk';font-weight:700;font-size:16px;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .wordmark .spade{width:16px;height:16px;background:var(--brand);border-radius:3px 3px 3px 8px;transform:rotate(45deg)}
  .wordmark small{font-weight:500;color:#9aa2b1;font-size:11px;letter-spacing:.04em;text-transform:uppercase;margin-left:2px}
  .top .spacer{flex:1}
  .top-btn{color:#c7cdd8;font-size:13px;font-weight:500;padding:7px 11px;border-radius:8px}
  .top-btn:hover{background:#252a33;color:#fff}
  .crumb{color:#9aa2b1;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
  .crumb b{color:#fff;font-weight:600}
  .crumb button{color:#9aa2b1}
  .crumb button:hover{color:#fff;text-decoration:underline}

  main{max-width:1180px;margin:0 auto;padding:26px 22px 90px}

  .port{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
  .port .cell{background:var(--card);padding:16px 18px}
  .port .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:600}
  .port .v{font-family:'Space Grotesk';font-weight:700;font-size:24px;margin-top:5px;letter-spacing:-.02em}
  .port .sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .port .v.pos{color:var(--good)} .port .v.neg{color:var(--bad)}

  .section-row{display:flex;align-items:center;justify-content:space-between;margin:26px 2px 12px}
  .section-row h2{font-family:'Space Grotesk';font-weight:600;font-size:15px;margin:0;letter-spacing:-.01em}
  .filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .chip{font-size:12.5px;font-weight:500;color:var(--ink-soft);padding:6px 11px;border-radius:20px;border:1px solid var(--line);background:var(--card)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}

  .board{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .13s ease,box-shadow .13s ease,border-color .13s;position:relative;overflow:hidden}
  .pcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:#d4d8df}
  .pcard .statusline{position:absolute;left:0;top:0;bottom:0;width:4px}
  .pcard.good .statusline{background:var(--good)} .pcard.warn .statusline{background:var(--warn)} .pcard.bad .statusline{background:var(--bad)} .pcard.none .statusline{background:var(--line)}
  .pcard .head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:3px}
  .pcard .name{font-family:'Space Grotesk';font-weight:600;font-size:16.5px;letter-spacing:-.01em;margin:0}
  .pcard .cp{font-size:12.5px;color:var(--ink-soft);margin-top:1px}
  .statusdot{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .statusdot i{width:7px;height:7px;border-radius:50%}
  .sd-good{background:var(--good-bg);color:var(--good)} .sd-good i{background:var(--good)}
  .sd-warn{background:var(--warn-bg);color:var(--warn)} .sd-warn i{background:var(--warn)}
  .sd-bad{background:var(--bad-bg);color:var(--bad)} .sd-bad i{background:var(--bad)}
  .sd-none{background:var(--line-soft);color:var(--ink-faint)} .sd-none i{background:var(--ink-faint)}
  .snapmeta{font-size:11.5px;color:var(--ink-faint);font-weight:500;margin:2px 0 10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .cat{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);background:var(--accent-soft);padding:2px 7px;border-radius:5px}
  .verdict{font-size:13.5px;color:var(--ink);line-height:1.5;margin:0 0 14px;min-height:20px}
  .verdict.empty{color:var(--ink-faint);font-style:italic}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;margin-bottom:12px}
  .metric .ml{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .metric .mlab{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:600}
  .metric .mval{font-family:'JetBrains Mono';font-weight:500;font-size:12px}
  .metric .mval .pct{font-weight:700;margin-left:5px}
  .metric .mval .pct.pos{color:var(--good)} .metric .mval .pct.neg{color:var(--bad)}
  .bar{position:relative;height:7px;background:var(--track);border-radius:4px;overflow:visible}
  .bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .bar .fill.pos{background:var(--good)} .bar .fill.neg{background:var(--bad)} .bar .fill.mid{background:var(--warn)}
  .bar .tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);border-radius:2px}
  .bar .tick::after{content:'';position:absolute;top:-4px;left:-2px;width:6px;height:4px;background:var(--ink);border-radius:0 0 3px 3px}
  .cardfoot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line-soft);padding-top:11px;margin-top:2px}
  .valadd{font-size:12px;color:var(--ink-soft)}
  .valadd b{font-family:'JetBrains Mono';color:var(--good);font-weight:700}
  .callbadge{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;border-radius:6px;border:1px solid var(--line)}
  .call-renew{color:var(--good);border-color:var(--good)} .call-evolve{color:var(--accent);border-color:var(--accent)}
  .call-renegotiate{color:var(--warn);border-color:var(--warn)} .call-exit{color:var(--bad);border-color:var(--bad)}
  .addcard{display:flex;align-items:center;justify-content:center;border:1.5px dashed var(--line);border-radius:var(--radius);background:transparent;color:var(--ink-soft);font-weight:500;min-height:120px;font-size:14px;gap:8px}
  .addcard:hover{border-color:var(--accent);color:var(--accent);background:var(--card)}
  .empty-state{text-align:center;padding:70px 20px;color:var(--ink-soft)}
  .empty-state h3{font-family:'Space Grotesk';color:var(--ink);font-size:18px;margin:0 0 6px}

  .detail-head{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);margin-bottom:18px}
  .dh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .dh-name{font-family:'Space Grotesk';font-weight:700;font-size:24px;letter-spacing:-.02em;margin:0}
  .dh-cp{color:var(--ink-soft);font-size:13.5px;margin-top:3px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .dh-term{font-size:12.5px;color:var(--ink-faint)}
  .dh-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .snap-select{display:flex;align-items:center;gap:8px}
  .snap-select label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:600}
  select.sel,input.inp,textarea.inp{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;width:100%}
  select.sel{padding-right:26px}
  input.inp:focus,textarea.inp:focus,select.sel:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
  .snap-select select{width:auto;min-width:190px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  @media(max-width:860px){.grid2{grid-template-columns:1fr}.board{grid-template-columns:1fr}.port{grid-template-columns:1fr 1fr}.metrics{grid-template-columns:1fr}}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line-soft)}
  .panel-head h3{font-family:'Space Grotesk';font-weight:600;font-size:14px;margin:0;letter-spacing:.01em;display:flex;align-items:center;gap:8px}
  .panel-head .lil{font-size:11px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .panel-body{padding:18px}
  .linkbtn{color:var(--accent);font-size:12.5px;font-weight:600;padding:5px 9px;border-radius:7px}
  .linkbtn:hover{background:var(--accent-soft)}

  .comm-metric{margin-bottom:20px}
  .comm-metric:last-child{margin-bottom:0}
  .comm-metric .cm-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .comm-metric .cm-name{font-weight:600;font-size:13.5px}
  .comm-metric .cm-fig{font-family:'JetBrains Mono';font-size:13px}
  .comm-metric .cm-fig .a{font-weight:700;font-size:15px}
  .comm-metric .cm-fig .e{color:var(--ink-faint)}
  .comm-metric .cm-delta{font-family:'JetBrains Mono';font-weight:700;font-size:12.5px;margin-left:8px}
  .comm-metric .cm-delta.pos{color:var(--good)} .comm-metric .cm-delta.neg{color:var(--bad)}
  .bar.big{height:11px}

  /* components (shows / packages) */
  .comp{border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 15px;margin-bottom:12px;background:#fcfcfd}
  .comp:last-child{margin-bottom:0}
  .comp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:11px}
  .comp-name{font-weight:600;font-size:14px}
  .comp-mode{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);background:var(--line-soft);padding:2px 6px;border-radius:4px;font-weight:600;margin-left:7px}
  .comp-inv{font-family:'JetBrains Mono';font-weight:700;font-size:14px}
  .comp-inv small{display:block;font-family:'Inter';font-weight:500;font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;text-align:right}
  .aud-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;margin-bottom:5px}
  .aud-row .mlab{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:600}
  .aud-row .mono{font-weight:500}
  .cpm-line{display:flex;gap:16px;margin-top:9px;font-size:12px;color:var(--ink-soft)}
  .cpm-line b{font-family:'JetBrains Mono'}
  .comp-ent{margin-top:10px;padding-top:9px;border-top:1px dashed var(--line)}
  .comp-ent summary{font-size:11.5px;color:var(--accent);font-weight:600;cursor:pointer;list-style:none}
  .comp-ent summary::-webkit-details-marker{display:none}
  .ent-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .ent-chip{font-size:11px;background:var(--line-soft);color:var(--ink-soft);padding:3px 8px;border-radius:5px}
  .comp-editbtn{opacity:0;color:var(--ink-faint);font-size:13px;padding:2px 7px;border-radius:5px}
  .comp:hover .comp-editbtn{opacity:1}
  .comp-editbtn:hover{background:var(--line-soft);color:var(--ink)}
  .media-total{display:flex;justify-content:space-between;align-items:center;border-top:2px solid var(--line);margin-top:4px;padding-top:12px;font-size:13px}
  .media-total .mt-l{font-weight:700}
  .media-total .mt-r{font-family:'JetBrains Mono';font-weight:700;text-align:right}
  .media-total .mt-r small{display:block;font-family:'Inter';font-weight:500;font-size:11px;color:var(--ink-soft)}

  .quads{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--line);margin-bottom:16px}
  .quad{background:var(--card);padding:14px 15px;min-height:96px}
  .quad h4{font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin:0 0 9px;display:flex;align-items:center;gap:7px}
  .quad h4 .qi{width:6px;height:6px;border-radius:50%}
  .quad.win h4{color:var(--good)} .quad.win h4 .qi{background:var(--good)}
  .quad.fall h4{color:var(--bad)} .quad.fall h4 .qi{background:var(--bad)}
  .quad.deliv h4{color:var(--ink-soft)} .quad.deliv h4 .qi{background:var(--ink-soft)}
  .quad.evo h4{color:var(--accent)} .quad.evo h4 .qi{background:var(--accent)}
  .quad ul{margin:0;padding-left:16px} .quad li{font-size:12.5px;margin-bottom:6px;line-height:1.42}
  .quad .none{font-size:12.5px;color:var(--ink-faint);font-style:italic}

  /* strategic levers */
  .levers{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:860px){.levers{grid-template-columns:1fr 1fr}}
  .lever{border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 13px;background:#fcfcfd}
  .lever .lv-h{display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .lever .lv-name{font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;color:var(--ink)}
  .lever .lv-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .lv-dot.good{background:var(--good)} .lv-dot.watch{background:var(--warn)} .lv-dot.concern{background:var(--bad)} .lv-dot.none{background:var(--line)}
  .lever .lv-note{font-size:12px;color:var(--ink-soft);line-height:1.45}
  .lever .lv-note.empty{color:var(--ink-faint);font-style:italic}

  .flag{}
  .verdict-panel{border-top:3px solid var(--accent)}
  .vp-status{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .vp-opt{flex:1;min-width:90px;text-align:center;padding:9px;border-radius:9px;border:1.5px solid var(--line);font-weight:600;font-size:12.5px;color:var(--ink-soft)}
  .vp-opt.sel-good{border-color:var(--good);background:var(--good-bg);color:var(--good)}
  .vp-opt.sel-warn{border-color:var(--warn);background:var(--warn-bg);color:var(--warn)}
  .vp-opt.sel-bad{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600;margin-bottom:6px}
  .field .hint{font-size:11.5px;color:var(--ink-faint);font-weight:400;text-transform:none;letter-spacing:0;margin-top:5px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  .btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13px;padding:9px 15px;border-radius:9px;transition:.12s}
  .btn-primary{background:var(--accent);color:#fff} .btn-primary:hover{background:#2559c4}
  .btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)} .btn-ghost:hover{border-color:var(--ink-soft)}
  .btn-danger{color:var(--bad)} .btn-danger:hover{background:var(--bad-bg)}

  .scrim{position:fixed;inset:0;background:rgba(20,24,31,.42);backdrop-filter:blur(2px);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .modal{background:var(--card);border-radius:16px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);animation:pop .16s ease}
  .modal.wide{max-width:700px}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-family:'Space Grotesk';font-weight:600;font-size:16px;margin:0}
  .modal-body{padding:20px 22px;max-height:68vh;overflow-y:auto}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .x{font-size:20px;color:var(--ink-faint);padding:4px 8px;border-radius:6px;line-height:1} .x:hover{background:var(--line-soft);color:var(--ink)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:80;box-shadow:var(--shadow-lg);animation:pop .16s}
  .example-tag{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--warn);background:var(--warn-bg);padding:2px 7px;border-radius:5px;text-transform:uppercase}

  /* view-as toggle */
  .viewas{display:flex;align-items:center;gap:10px}
  .viewas .email{color:#9aa2b1;font-size:12px}
  .vtoggle{display:flex;background:#252a33;border-radius:8px;padding:3px}
  .vtoggle button{font-size:12px;font-weight:600;color:#9aa2b1;padding:5px 11px;border-radius:6px}
  .vtoggle button.on{background:var(--accent);color:#fff}

  /* partner portal */
  .pbanner{background:linear-gradient(180deg,var(--ink),#1e222b);color:#fff;border-radius:var(--radius);padding:22px 24px;margin-bottom:18px}
  .pbanner .pb-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#9aa2b1;font-weight:600}
  .pbanner h1{font-family:'Space Grotesk';font-weight:700;font-size:24px;margin:5px 0 8px;letter-spacing:-.01em}
  .pbanner p{margin:0;color:#c7cdd8;font-size:13.5px;max-width:640px;line-height:1.5}
  .pbanner .pb-note{margin-top:12px;font-size:12px;color:#9aa2b1;display:flex;align-items:center;gap:7px}
  .pbanner .pb-note i{width:7px;height:7px;border-radius:50%;background:var(--warn)}

  .pshow{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
  .pshow-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line-soft)}
  .pshow-head .ps-name{font-family:'Space Grotesk';font-weight:600;font-size:16px}
  .pshow-head .ps-sum{font-size:12px;color:var(--ink-soft);text-align:right}
  .pshow-head .ps-sum b{font-family:'JetBrains Mono';color:var(--ink);font-weight:700;font-size:14px;display:block}
  .pshow-body{padding:18px 20px}

  .wk-list{margin-bottom:14px}
  .wk-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid var(--line-soft);border-radius:8px;margin-bottom:7px;font-size:13px}
  .wk-item .wk-l{display:flex;align-items:center;gap:10px}
  .wk-item .wk-aud{font-family:'JetBrains Mono';font-weight:600}
  .wk-status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:5px}
  .wk-pending{background:var(--warn-bg);color:var(--warn)} .wk-verified{background:var(--good-bg);color:var(--good)}
  .wk-empty{font-size:13px;color:var(--ink-faint);font-style:italic;margin-bottom:12px}

  .wkform{background:#fafbfc;border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px}
  .wkform h5{font-family:'Space Grotesk';font-size:13px;margin:0 0 12px;font-weight:600}
  .wk-sub{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:700;margin:14px 0 8px}

function money(v){ if(v===null||v===''||isNaN(+v))return '—'; const x=+v;

/* weekly log helpers */
function weeksOf(c){ return c.weeks||[]; }

function deliveredFromWeeks(c){ const ws=weeksOf(c); if(!ws.length)return null; return ws.reduce((a,w)=>a+weekAudTotal(w),0); }
function weeksLogged(c){ return weeksOf(c).length; }
function assetDeliveredTotal(c,assetId){ return weeksOf(c).reduce((a,w)=>a+(+((w.assets||{})[assetId])||0),0); }
function audDelivered(c){ const dw=deliveredFromWeeks(c); return dw!==null?dw:n(c.audienceDelivered); }

/* media roll-up for a snapshot */
function mediaRoll(s){
  let inv=0,guar=0,del=0,hasAud=false,hasInv=false;
  (s.media.components||[]).forEach(c=>{
    const ci=n(c.investment); if(ci!==null){inv+=ci;hasInv=true;}
    if(c.mode==='audience'){ const g=n(c.audienceGuaranteed),d=audDelivered(c);
      if(g!==null){guar+=g;hasAud=true;} if(d!==null)del+=d; }
  });
  return { inv:hasInv?inv:null, guar:hasAud?guar:null, del:del||null, hasAud,
    propCpm:(hasInv&&guar)?cpm(inv,guar):null, delCpm:(hasInv&&del)?cpm(inv,del):null };
}
/* delivered "value realised" for fixed / fulfilment components (dollar sense) */
function compRealised(c){
  const inv=n(c.investment)||0;
  if(c.mode==='fixed') return c.fixedDelivered?inv:0;
  if(c.mode==='fulfilment'){ const d=n(c.deliveredQty),ct=n(c.contractedQty); if(d===null||!ct)return null; return inv*Math.min(d/ct,1); }
  return null; // audience handled via CPM/reach
}

function bar(act,exp,big){
  const a=n(act),e=n(exp);
  if(a===null&&e===null)return `<div class="bar ${big?'big':''}"></div>`;
  const max=Math.max(a||0,e||0)*1.15||1;
  let cls='mid'; if(a!==null&&e!==null)cls=a>=e?'pos':(a>=e*0.85?'mid':'neg');
  return `<div class="bar ${big?'big':''}"><div class="fill ${cls}" style="width:${Math.min((a||0)/max*100,100)}%"></div>${e!==null?`<div class="tick" style="left:${Math.min((e||0)/max*100,100)}%"></div>`:''}</div>`;
}
/* bar where LOWER is better (CPM): fill green if act<=exp */
function barInverse(act,exp){
  const a=n(act),e=n(exp); if(a===null)return `<div class="bar"></div>`;
  const max=Math.max(a,e||0)*1.15||1;
  const cls=(e!==null)?(a<=e?'pos':(a<=e*1.15?'mid':'neg')):'mid';
  return `<div class="bar"><div class="fill ${cls}" style="width:${Math.min(a/max*100,100)}%"></div>${e!==null?`<div class="tick" style="left:${Math.min(e/max*100,100)}%"></div>`:''}</div>`;
}

    if(n(s.media.valueAdd)!==null)valAdd+=n(s.media.valueAdd); });

function pcard(p){
  const s=latestSnap(p); const st=s.status||'none';
  const stLabel={good:'On track',warn:'Watch',bad:'Off track',none:'Not set'}[st];
  const hasNgr=n(s.commercial.ngrExp)!==null||n(s.commercial.ngrAct)!==null;
  const m=mediaRoll(s);
  let metricsHtml;
  if(hasNgr){
    const ngrP=pctDiff(s.commercial.ngrAct,s.commercial.ngrExp), actP=pctDiff(s.commercial.activesAct,s.commercial.activesExp);
    metricsHtml=`<div class="metrics">
      <div class="metric"><div class="ml"><span class="mlab">NGR</span><span class="mval">${money(s.commercial.ngrAct)}${ngrP!==null?`<span class="pct ${ngrP>=0?'pos':'neg'}">${ngrP>0?'+':''}${ngrP}%</span>`:''}</span></div>${bar(s.commercial.ngrAct,s.commercial.ngrExp)}</div>
      <div class="metric"><div class="ml"><span class="mlab">Actives</span><span class="mval">${num(s.commercial.activesAct)}${actP!==null?`<span class="pct ${actP>=0?'pos':'neg'}">${actP>0?'+':''}${actP}%</span>`:''}</span></div>${bar(s.commercial.activesAct,s.commercial.activesExp)}</div>
    </div>`;
  } else {
    const audP=pctDiff(m.del,m.guar);
    const cpmDelivered=m.delCpm, cpmProp=m.propCpm;
    metricsHtml=`<div class="metrics">
      <div class="metric"><div class="ml"><span class="mlab">Audience</span><span class="mval">${m.del!==null?aud(m.del):(m.guar!==null?aud(m.guar)+' guar':'—')}${audP!==null?`<span class="pct ${audP>=0?'pos':'neg'}">${audP>0?'+':''}${audP}%</span>`:''}</span></div>${m.del!==null?bar(m.del,m.guar):bar(m.guar,m.guar)}</div>
      <div class="metric"><div class="ml"><span class="mlab">CPM</span><span class="mval">${cpmDelivered!==null?'$'+cpmDelivered.toFixed(2):(cpmProp!==null?'$'+cpmProp.toFixed(2)+' proj':'—')}${cpmDelivered!==null&&cpmProp!==null?`<span class="pct ${cpmDelivered<=cpmProp?'pos':'neg'}">${cpmDelivered<=cpmProp?'▼':'▲'}</span>`:''}</span></div>${cpmDelivered!==null?barInverse(cpmDelivered,cpmProp):bar(0,1)}</div>
    </div>`;
  }
  const va=n(s.media.valueAdd);
  const overDel=(m.hasAud&&m.del!==null&&m.guar!==null&&m.del>m.guar)?(m.del-m.guar):null;
  return `<div class="pcard ${st}" onclick="openDetail('${p.id}')">
    <div class="statusline"></div>
    <div class="head"><div><h3 class="name">${esc(p.name)} ${p.example?'<span class="example-tag">Example</span>':''}</h3><div class="cp">${esc(p.counterparty||'')}</div></div>
      <span class="statusdot sd-${st}"><i></i>${stLabel}</span></div>
    <div class="snapmeta"><span class="cat">${esc(p.category)}</span> · ${esc(s.label)} · ${fmtDate(s.date)}</div>
    <p class="verdict ${s.verdict?'':'empty'}">${s.verdict?esc(s.verdict):'No verdict written yet'}</p>
    ${metricsHtml}
    <div class="cardfoot">
      <span class="valadd">${va?`Value-add <b>${money(va)}</b>`:(overDel?`Audience over-delivery <b>+${aud(overDel)}</b>`:'<span style="color:var(--ink-faint)">'+(m.inv!==null?money(m.inv)+' invested':'—')+'</span>')}</span>
      ${s.call?`<span class="callbadge call-${s.call}">${s.call}</span>`:''}
    </div>
  </div>`;
}

function commMetric(name,act,exp,p,fmt){
  return `<div class="comm-metric"><div class="cm-head"><span class="cm-name">${name}</span>
    <span class="cm-fig"><span class="a">${fmt(act)}</span> <span class="e">/ ${fmt(exp)} exp</span>${p!==null?`<span class="cm-delta ${p>=0?'pos':'neg'}">${p>0?'+':''}${p}%</span>`:''}</span></div>${bar(act,exp,true)}</div>`;
}
function componentBlock(comp){
  const inv=n(comp.investment);
  const wl=weeksLogged(comp);
  let body='';
  if(comp.mode==='audience'){
    const g=n(comp.audienceGuaranteed),d=audDelivered(comp);
    const audP=pctDiff(d,g); const pc=cpm(inv,g),dc=cpm(inv,d);
    const src=wl?` <span style="color:var(--ink-faint);font-weight:400;font-size:11px">(from ${wl} week${wl>1?'s':''})</span>`:'';
    body=`<div class="aud-row"><span class="mlab">Audience</span><span class="mono">${d!==null?aud(d)+' delivered':aud(g)+' projected'}${g!==null&&d!==null?' / '+aud(g)+' guar':''}${audP!==null?` <span style="color:var(--${audP>=0?'good':'bad'});font-weight:700">(${audP>0?'+':''}${audP}%)</span>`:''}${src}</span></div>
      ${d!==null?bar(d,g):bar(g,g)}
      <div class="cpm-line">${pc!==null?`Proposed CPM <b>$${pc.toFixed(2)}</b>`:''}${dc!==null?` → delivered <b style="color:var(--${dc<=pc?'good':'bad'})">$${dc.toFixed(2)}</b>`:''}</div>`;
  } else if(comp.mode==='fixed'){
    body=`<div class="cpm-line">${comp.fixedDelivered?'<b style="color:var(--good)">Delivered</b> — full value counted':'<span style="color:var(--ink-faint)">Not yet delivered</span>'}</div>`;
  } else {
    const d=n(comp.deliveredQty),ct=n(comp.contractedQty); const r=compRealised(comp);
    body=`<div class="aud-row"><span class="mlab">Fulfilment</span><span class="mono">${d!==null?d:'—'} of ${ct||'—'} ${esc(comp.unit||'')}${r!==null&&inv?` · <b>${money(r)}</b> realised`:''}</span></div>${d!==null&&ct?bar(d,ct):bar(0,1)}`;
  }
  // asset fulfilment strip (weekly asset schedule)
  let assetStrip='';
  if((comp.assets||[]).length){
    assetStrip=`<div class="assetfulfil-strip">`+comp.assets.map(as=>{
      const del=assetDeliveredTotal(comp,as.id); const target=(+as.perWeek||0)*wl;
      const cls=wl===0?'none':(del>=target?'ok':'under');
      return `<span class="afx ${cls}" title="${esc(as.name)}: contracted ${as.perWeek}/wk">${esc(as.name)} ${del}${wl?'/'+target:''}</span>`;
    }).join('')+`</div>`;
  } else if((comp.entitlements||[]).length){
    assetStrip=`<details class="comp-ent"><summary>${comp.entitlements.length} entitlements</summary><div class="ent-chips">${comp.entitlements.map(e=>`<span class="ent-chip">${esc(e)}</span>`).join('')}</div></details>`;
  }
  // weekly log (internal: view + verify)
  let log='';
  if(wl){
    log=`<details class="wklog"><summary>Weekly log — ${wl} week${wl>1?'s':''}${weeksOf(comp).some(w=>w.status!=='verified')?' · <span style="color:var(--warn)">'+weeksOf(comp).filter(w=>w.status!=='verified').length+' pending</span>':''}</summary>
      <table><thead><tr><th>Week</th><th class="num">Audience</th><th>Status</th><th></th></tr></thead><tbody>
      ${weeksOf(comp).map(w=>`<tr><td>${esc(w.label)}${w.note?` <span style="color:var(--ink-faint);font-size:10px">· ${esc(w.note)}</span>`:''}</td><td class="num">${aud(weekAudTotal(w))}</td>
        <td><span class="wk-status wk-${w.status||'pending'}">${w.status||'pending'}</span></td>
        <td style="text-align:right">${w.status!=='verified'?`<button class="verifybtn" onclick="verifyWeek('${comp.id}','${w.id}')">Verify</button>`:''}</td></tr>`).join('')}
      </tbody></table></details>`;
  }
  return `<div class="comp">
    <div class="comp-head"><div><span class="comp-name">${esc(comp.name)}</span><span class="comp-mode">${comp.mode}</span></div>
      <div style="display:flex;align-items:flex-start;gap:4px"><span class="comp-inv">${money(comp.investment)}<small>investment</small></span><button class="comp-editbtn" onclick="editComponent('${comp.id}')">✎</button></div></div>
    ${body}${assetStrip}${log}
  </div>`;
}

  const s=curSnap(); const c=s.media.components.find(x=>x.id===cid); const w=c.weeks.find(x=>x.id===wid); if(w){w.status='verified';await persist();render();toast('Week verified');} }

async function saveWeek(cid,wid){
  const s=latestSnap(STATE.partnerships.find(x=>x.id===view.partnerPid));
  const c=s.media.components.find(x=>x.id===cid);
  const label=document.getElementById('w_label').value.trim(); if(!label){toast('Give the week a label');return;}

  const audience={}; (c.platforms||[]).forEach(pl=>{ const v=document.getElementById('wa_'+slug(pl)); if(v&&v.value!=='')audience[pl]=+v.value; });
  const assetsObj={};
  if((c.assets||[]).length) c.assets.forEach(as=>{ const v=document.getElementById('wk_'+as.id); if(v&&v.value!=='')assetsObj[as.id]=+v.value; });
  else if(c.mode==='fulfilment'){ const v=document.getElementById('wk_qty'); if(v&&v.value!=='')assetsObj.qty=+v.value; }
  if(SB){
    try{
      if(wid) await sbUpdateWeek(wid,{label,audience,assets:assetsObj,note});
      else await sbInsertWeek({partnership_id:c.partnership_id||view.partnerPid,component_id:cid,label,audience,assets:assetsObj,note});
      await refreshPartner(); closeModal(); toast(wid?'Week updated':'Week submitted');
    }catch(e){ toast('Error: '+e.message); }
    return;
  }
  c.weeks=c.weeks||[];
  if(wid){ const wk=c.weeks.find(x=>x.id===wid); Object.assign(wk,{label,note,audience,assets:assetsObj,status:'pending'}); }
  else c.weeks.push({id:uid(),label,note,audience,assets:assetsObj,status:'pending',submittedAt:new Date().toISOString().slice(0,10)});
  if(c.mode==='fulfilment') c.deliveredQty=c.weeks.reduce((a,w)=>a+(+((w.assets||{}).qty)||0),0);
  await persist(); closeModal(); render(); toast(wid?'Week updated':'Week submitted');
}
async function deleteWeek(cid,wid){
  const s=latestSnap(STATE.partnerships.find(x=>x.id===view.partnerPid));
  const c=s.media.components.find(x=>x.id===cid);
  if(!confirm('Delete this week?'))return;
  if(SB){ try{ await sbDeleteWeek(wid); await refreshPartner(); closeModal(); toast('Deleted'); }catch(e){ toast('Error: '+e.message); } return; }
  c.weeks=(c.weeks||[]).filter(x=>x.id!==wid);
  if(c.mode==='fulfilment') c.deliveredQty=c.weeks.reduce((a,w)=>a+(+((w.assets||{}).qty)||0),0);
  await persist(); closeModal(); render(); toast('Deleted');
}

      <label style="font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600">Review narrative</label>
      <div class="frow" style="margin-top:8px"><div class="field"><label>Topline deliverables</label>${ta('a_deliv',a.deliverables)}</div><div class="field"><label>Where we're winning</label>${ta('a_win',a.winning)}</div></div>
      <div class="frow"><div class="field"><label>Where we're falling down</label>${ta('a_fall',a.falling)}</div><div class="field"><label>Next evolution</label>${ta('a_evo',a.evolution)}</div></div>
      <label style="font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600">Strategic levers</label>
      <div style="margin-top:8px">${LEVERS.map(([k,l])=>lv(k,l)).join('')}</div>
    </div>
    <div class="modal-foot"><div></div><div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveAssessment()">Save</button></div></div>`,true));
}
async function saveAssessment(){
  const a=curSnap().assessment;
  const lines=id=>document.getElementById(id).value.split('\n').map(x=>x.trim()).filter(Boolean);
  a.deliverables=lines('a_deliv'); a.winning=lines('a_win'); a.falling=lines('a_fall'); a.evolution=lines('a_evo');
  LEVERS.forEach(([k])=>{ a.levers[k]={rating:document.getElementById('lv_'+k+'_r').value,note:document.getElementById('lv_'+k+'_n').value.trim()}; });
  await persist(); closeModal(); render(); toast('Assessment saved');
}

function dataMenu(){
  mount(scrim(`<div class="modal-head"><h3>Data</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><p style="font-size:13px;color:var(--ink-soft);margin-top:0">Data is stored in this browser. For the shared team build, swap the storage adapter for Supabase (note at the top of the file).</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-ghost" onclick="exportData()">⬇ Export JSON</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">⬆ Import JSON</button>
        <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(this)"></div>
      <div style="margin-top:18px;border-top:1px solid var(--line-soft);padding-top:14px"><button class="btn btn-danger" onclick="resetData()">Reset to seed data</button></div></div>
    <div class="modal-foot"><div></div><button class="btn btn-primary" onclick="closeModal()">Done</button></div>`));
}
function exportData(){ const b=new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download='partnership-review-backup.json'; a.click(); URL.revokeObjectURL(u); toast('Exported'); }
function importData(input){ const f=input.files[0]; if(!f)return; const r=new FileReader(); r.onload=async()=>{try{STATE=JSON.parse(r.result);await persist();closeModal();go('board');toast('Imported');}catch(e){toast('Could not read that file');}}; r.readAsText(f); }
async function resetData(){ if(!confirm('Reset to seeded data? Current entries will be lost.'))return; STATE=seed(); await persist(); closeModal(); go('board'); toast('Reset'); }

document.getElementById('btnData').onclick=dataMenu;
Object.assign(window,{editPartnership,go,openDetail,setFilter,pickSnap,setStatus,setCall,saveVerdict,savePartnership,deletePartnership,addSnapshot,saveSnapshot,deleteSnapshot,editCommercial,saveCommercial,editValueAdd,saveValueAdd,editComponent,compModeFields,saveComponent,delComponent,editAssessment,saveAssessment,exportData,importData,resetData,closeModal,setMode,setPartner,openWeekForm,saveWeek,deleteWeek,verifyWeek});

(async function boot(){
  if(SB){
    try{
      const {data:{session}}=await SB.auth.getSession();
      if(!session){ SB.auth.onAuthStateChange((_e,sess)=>{ if(sess) location.reload(); }); renderLogin(); return; }
      view.email=session.user.email;
      // owner?
      const {data:owner}=await SB.from('pr_owner').select('email').eq('email',view.email).maybeSingle();
      if(owner){ view.role='owner'; view.mode='internal'; STATE=await db.load(); if(!STATE||!STATE.partnerships){STATE=seed();await db.save(STATE);} await ownerRefreshWeeks(); render(); return; }
      // partner?
      view.role='partner'; view.mode='partner'; await loadPartnerData();
      if(STATE.partnerships.length){ render(); return; }
      renderNoAccess(); return;
    }catch(e){ console.error(e); renderLogin('Something went wrong connecting. Check the console.'); return; }
  }
  // local mode (no anon key yet) — works exactly as before
  STATE=await db.load(); if(!STATE||!STATE.partnerships){STATE=seed();await persist();} render();
})();
</script>
